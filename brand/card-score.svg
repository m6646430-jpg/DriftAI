<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#161b36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.30" r="0.7">
      <stop offset="0" stop-color="#6d8bff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#6d8bff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="540" cy="330" r="520" fill="url(#glow)"/>
  
  <g transform="translate(80 90)">
    <rect x="0" y="-34" width="60" height="60" rx="16" fill="url(#accent)"/>
    <text x="30" y="12" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="800" fill="#0b1020">D</text>
    <text x="82" y="10" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="800">
      <tspan fill="#ffffff">Drift</tspan><tspan fill="url(#accent)">AI</tspan>
    </text>
  </g>
  
  <text x="80" y="250" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="900" fill="#ffffff">Free AI Resume<tspan x="80" dy="84">Score</tspan></text>
  <!-- score ring -->
  <g transform="translate(540 620)">
    <circle r="180" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="34"/>
    <circle r="180" fill="none" stroke="url(#accent)" stroke-width="34" stroke-linecap="round"
            stroke-dasharray="1131" stroke-dashoffset="192" transform="rotate(-90)"/>
    <text y="-10" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="130" font-weight="900" fill="#ffffff">83</text>
    <text y="60" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.5)">/ 100</text>
  </g>
  <text x="540" y="900" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#dbe2ff">No signup · results in seconds</text>
  <text x="540" y="965" text-anchor="middle" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="800" fill="url(#accent)">driftai.info</text>

</svg>