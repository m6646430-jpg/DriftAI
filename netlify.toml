# DriftAI — Netlify deployment config
# Connect this repo in Netlify → every push to the deploy branch auto-publishes.

[build]
  publish = "."
  # Fetch fresh jobs with EXACT posting links from public ATS feeds
  # (Greenhouse/Lever/Ashby) at build time. Free, no API key needed.
  # The scheduled function triggers a rebuild twice daily to refresh.
  command = "node scripts/fetch-jobs-ats.js"

[build.environment]
  NODE_VERSION = "20"

# Netlify Scheduled Function lives here — it triggers the twice-daily rebuild.
[functions]
  directory = "netlify/functions"

# Keep the private admin dashboard out of search engines.
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Job/dashboard data: let browsers cache briefly so the daily refresh shows fast.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

# Send the deprecated single-plan URL to the current pricing, if anyone has it.
[[redirects]]
  from = "/pricing"
  to = "/#pricing"
  status = 301
